name: Refresh TOEIC Centers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-centers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preview TOEIC center changes
        run: node scripts/update-toeic-centers.mjs --check --report /tmp/toeic-centers-pr-report.json
        continue-on-error: true

      - name: Refresh TOEIC centers
        run: npm run centers:refresh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh TOEIC center coordinates"
          branch: automation/toeic-centers-refresh
          title: "chore: refresh TOEIC center coordinates"
          body-path: /tmp/toeic-centers-pr-report.md
          add-paths: |
            public/toeic_centers.csv
            reports/toeic-centers-report.json
            reports/toeic-centers-report.md
            reports/toeic-centers-state.json
